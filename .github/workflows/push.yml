name: ESP32 Arduino Libs CI

on:
  push:
    branches:
    - ble-only-esp32
  pull_request:

concurrency:
  group: esp-idf-libs-${{github.event.pull_request.number || github.ref}}
  cancel-in-progress: true

jobs:
  build-libs:
    name: Build ESP32 Libs (BLE-only)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: bash ./tools/prepare-ci.sh

    - name: Build Libs for ESP32
      run: bash ./build.sh -e -t esp32

    - name: Upload build (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-esp32
        path: build

    - name: Upload archive
      uses: actions/upload-artifact@v4
      with:
        name: esp32-arduino-libs
        path: dist

  release:
    name: Create Release
    needs: build-libs
    if: github.event_name == 'push' && github.ref == 'refs/heads/ble-only-esp32'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32-arduino-libs
          path: dist

      - name: Create release zip
        run: |
          cd dist
          # The archive-build.sh creates a tar.gz per target
          # Repackage as a zip for platformio compatibility
          mkdir -p out
          for f in *.tar.gz; do
            tar xzf "$f" -C out
          done
          cd out/tools/esp32-arduino-libs
          zip -r ../../../esp32-arduino-libs-ble-only.zip *
          cd ../../..

      - name: Generate tag
        id: tag
        run: echo "tag=ble-only-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ESP32 BLE-only libs (${{ steps.tag.outputs.tag }})"
          body: |
            Custom ESP32 Arduino libs built from IDF v5.4 with memory optimizations:
            - BLE-only mode (CONFIG_BTDM_CTRL_MODE_BLE_ONLY) - saves ~31KB DRAM
            - Classic BT disabled (A2DP, SPP, HFP removed)
            - WiFi static RX buffers reduced (4 from 8)
            - WiFi dynamic buffers reduced (16 from 32)
            - SPIRAM WiFi/LWIP allocation enabled
            - Asymmetric TLS content length (4KB TX / 16KB RX)
            - BLE Mesh, Matter, Zigbee, PPP, CSI, SoftAP disabled
          files: |
            dist/esp32-arduino-libs-ble-only.zip
